services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sova
      POSTGRES_USER: sova
      POSTGRES_PASSWORD: sova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sova"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sova:sova@postgres:5432/sova
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  ai-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sova:sova@postgres:5432/sova
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src.workers.ai_worker

  cron-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sova:sova@postgres:5432/sova
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src.workers.cron_worker

  trade-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sova:sova@postgres:5432/sova
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src.workers.trade_worker

volumes:
  pgdata:
