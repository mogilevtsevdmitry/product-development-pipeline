apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: sova
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/part-of: sova
    app.kubernetes.io/component: migration
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/part-of: sova
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: sova-app:latest
          command: ["alembic", "upgrade", "head"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sova-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+psycopg2://sova:$(POSTGRES_PASSWORD)@postgres:5432/sova"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
