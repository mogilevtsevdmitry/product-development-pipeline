variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  INFRA_REPO: "gitlab.xn--d1acaxq.xn--p1ai/devops/infrastructure.git"
  SERVICE_NAME: "financial-agent"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

image: docker:24

services:
  - docker:24-dind

stages:
  - fetch-secrets
  - build-and-push
  - migrate
  - deploy

# ---- Stage 1: Fetch secrets from Vault ----
fetch-secrets:
  image: hashicorp/vault:1.15.2
  stage: fetch-secrets
  before_script:
    - apk add --no-cache jq
  script:
    - export VAULT_ADDR="https://vault.xn--d1acaxq.xn--p1ai"
    - export VAULT_TOKEN=$VAULT_TOKEN
    - vault status
    - vault kv get -format=json kv/env/financial-agent | jq -r '.data.data | to_entries[] | "export \(.key|gsub("[^A-Za-z0-9_]"; "_"))=\(.value|tostring|@sh)"' > build.env
  artifacts:
    paths:
      - build.env
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

# ---- Stage 2: Build Docker image (app + dashboard + workers) ----
build:
  stage: build-and-push
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd sova
    - docker build -t ${IMAGE_NAME} -f Dockerfile .
    - docker push ${IMAGE_NAME}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

# ---- Stage 3: Run Alembic migrations ----
migrate:
  image: python:3.12-slim
  stage: migrate
  before_script:
    - set -a && [ -f build.env ] && . build.env && set +a || true
  script:
    - |
      if [ -z "$DATABASE_URL" ]; then
        echo "❌ DATABASE_URL is not set"
        exit 1
      fi
    - cd sova
    - pip install --no-cache-dir .
    - alembic upgrade head
    - echo "✅ Migrations completed"
  needs:
    - fetch-secrets
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never

# ---- Stage 4: Update image tag in k8s and push to infra repo ----
deploy:
  image: alpine:latest
  stage: deploy
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "ci@sova.app"
    - git config --global user.name "GitLab CI"
  script:
    - git clone https://oauth2:${CI_PROJECT_ACCESS_TOKEN}@${INFRA_REPO} infrastructure
    - cd infrastructure/k8s/prod/${SERVICE_NAME}
    - yq eval ".image.tag = \"${CI_COMMIT_SHORT_SHA}\"" -i values.yaml
    - git add .
    - git commit -m "update ${SERVICE_NAME} image to ${CI_COMMIT_SHORT_SHA}" || true
    - |
      for i in 1 2 3 4 5; do
        if git pull --rebase origin main && git push origin main; then
          echo "Successfully pushed on attempt $i"
          break
        fi
        sleep $((i * 2))
      done
  needs:
    - build
    - migrate
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
