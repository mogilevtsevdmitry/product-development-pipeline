variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  DOCKER_BUILDKIT: 1
  BUILDKIT_INLINE_CACHE: 1
  INFRA_REPO: "gitlab.xn--d1acaxq.xn--p1ai/devops/infrastructure.git"
  SERVICE_NAME: "financial-agent"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_CACHE: "$CI_REGISTRY_IMAGE:cache"

image: docker:24

services:
  - docker:24-dind

stages:
  - build-and-push
  - deploy

# ---- Stage 1: Build Docker image (app + dashboard + workers) ----
build:
  stage: build-and-push
  before_script:
    - until docker info; do sleep 1; done
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd sova
    - docker pull ${IMAGE_CACHE} || true
    - |
      docker build \
        --cache-from ${IMAGE_CACHE} \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t ${IMAGE_NAME} \
        -t ${IMAGE_CACHE} \
        -f Dockerfile .
    - docker push ${IMAGE_NAME}
    - docker push ${IMAGE_CACHE}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

# ---- Stage 2: Update image tag in k8s and push to infra repo ----
# Migrations run as ArgoCD pre-sync hook Job (see k8s/prod/financial-agent/templates/migration-job.yaml)
deploy:
  image: alpine:latest
  stage: deploy
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "ci@sova.app"
    - git config --global user.name "GitLab CI"
  script:
    - git clone https://oauth2:${CI_PROJECT_ACCESS_TOKEN}@${INFRA_REPO} infrastructure
    - cd infrastructure/k8s/prod/${SERVICE_NAME}
    - yq eval ".image.tag = \"${CI_COMMIT_SHORT_SHA}\"" -i values.yaml
    - git add .
    - git commit -m "update ${SERVICE_NAME} image to ${CI_COMMIT_SHORT_SHA}" || true
    - |
      for i in 1 2 3 4 5; do
        if git pull --rebase origin main && git push origin main; then
          echo "Successfully pushed on attempt $i"
          break
        fi
        sleep $((i * 2))
      done
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
